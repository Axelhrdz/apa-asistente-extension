<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ingreso — clave APA</title>
    <link rel="stylesheet" href="/src/styles/local-dev.css" />
  </head>
  <body data-page="ingreso-clave">
    <header class="apa-dev-server-banner" role="status">
      <strong>APA extensión — entorno Linux local</strong>
      <span>Simulación de ingreso · datos reales en <code>cuenta.html</code> vía API</span>
    </header>
    <main>
      <form action="/cuenta.html" method="get">
        <label for="clave-input">Clave APA</label>
        <input
          id="clave-input"
          name="clave"
          type="text"
          inputmode="numeric"
          autocomplete="off"
          required
        />
        <button type="submit">Continuar</button>
      </form>
    </main>
  </body>
</html>
